# Publish vaultship to npm when a version tag is pushed.
# Tag format: v1.0.0 (must match package.json version).

name: npm Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishers (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # version read from package.json "packageManager": "pnpm@10.5.2"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify tag matches package version
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          PKG=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          if [ "$VER" != "$PKG" ]; then
            echo "Tag version $VER does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance
        # Auth via OIDC (Trusted Publishers); do not set NODE_AUTH_TOKEN
