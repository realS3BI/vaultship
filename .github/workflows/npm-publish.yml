# Publish vaultship to npm when a version tag is pushed.
# Tag format: 1.0.0 or v1.0.0 (must match package.json version).

name: npm Publish

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify tag matches package version
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          PKG=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          if [ "$VER" != "$PKG" ]; then
            echo "Tag version $VER does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
