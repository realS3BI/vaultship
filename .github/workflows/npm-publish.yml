# Publish vaultship to npm when a version tag is pushed.
# Tag format: v1.0.0 (must match package.json version).

name: npm Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # required for npm Trusted Publishers (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid tag format: $TAG (expected vX.Y.Z)"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VER="${TAG#v}"
          PKG=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json','utf8')).version)")
          if [ "$VER" != "$PKG" ]; then
            echo "Tag version $VER does not match package.json version $PKG"
            exit 1
          fi

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance
        # Auth via OIDC (Trusted Publishers); do not set NODE_AUTH_TOKEN
