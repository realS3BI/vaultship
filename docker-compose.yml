# Vaultship server (SQLite + API key)
# Optional: create .env with PORT, VAULTSHIP_API_KEY, DB_PATH (see README)

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8090}:${PORT:-8090}"
    environment:
      PORT: ${PORT:-8090}
      DB_PATH: ${DB_PATH:-/data/vaultship.db}
      VAULTSHIP_API_KEY: ${VAULTSHIP_API_KEY:-}
      PRINT_API_KEY: ${PRINT_API_KEY:-false}
    volumes:
      - server_data:/data

volumes:
  server_data:
