name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/}"

          if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release branch must be named release/vX.Y.Z. Got: $BRANCH"
            exit 1
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create Git Tag
        env:
          TAG: ${{ steps.version.outputs.version }}
          RELEASE_TOKEN: ${{ secrets.VAULTSHIP_RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists. Skipping tag creation."
          else
            git tag -a "$TAG" -m "Release $TAG"
            if [ -n "$RELEASE_TOKEN" ]; then
              git push "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git" "$TAG"
            else
              echo "::warning::VAULTSHIP_RELEASE_TOKEN is not set. Pushing with GITHUB_TOKEN; downstream tag workflows may not run."
              git push origin "$TAG"
            fi
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: ${{ github.event.pull_request.body }}
          generate_release_notes: false

      - name: Set up Docker Buildx
        if: ${{ vars.VAULTSHIP_DOCKER_RELEASE == 'true' && hashFiles('Dockerfile') != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: ${{ vars.VAULTSHIP_DOCKER_RELEASE == 'true' && hashFiles('Dockerfile') != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        if: ${{ vars.VAULTSHIP_DOCKER_RELEASE == 'true' && hashFiles('Dockerfile') != '' }}
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: ${{ vars.VAULTSHIP_DOCKER_RELEASE == 'true' && hashFiles('Dockerfile') != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Convex
        if: ${{ vars.CONVEX_DEPLOY == 'true' }}
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

      - name: Trigger Deployment Webhook
        if: ${{ vars.DEPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -X POST "${{ vars.DEPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -d '{"version":"${{ steps.version.outputs.version }}","repository":"${{ github.repository }}"}' \
            --fail --silent --show-error

      - name: Cleanup release branch
        run: |
          git push origin --delete "${{ github.event.pull_request.head.ref }}" || true
